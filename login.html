<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMART Access</title>
  <meta name="description" content="Customer, vendor, and admin login for EMART." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">
  <main class="role-login-page">
    <section class="role-login-shell">
      <div class="role-login-brand">
        <a class="brand" href="index.html" aria-label="EMART Home">
          <span class="brand-mark" aria-hidden="true">E</span>
          <span>
            <strong>EMART</strong>
            <small>role based access</small>
          </span>
        </a>
        <h1>Welcome to EMART</h1>
        <p>Choose your access type. Customers shop, vendors manage products, and admins oversee the whole store.</p>
      </div>

      <div class="role-login-card glass-panel">
        <div class="auth-tabs role-tabs">
          <button class="filter-pill active" type="button" data-auth-tab="customer">Customer Login</button>
          <button class="filter-pill" type="button" data-auth-tab="vendor">Vendor Login</button>
          <button class="filter-pill" type="button" data-auth-tab="admin">Admin Login</button>
        </div>

        <form class="auth-form role-panel" id="customerLoginForm" data-auth-panel="customer">
          <span class="eyebrow">Customer</span>
          <h2>Shop and checkout</h2>
          <label class="form-field">
            <span>Email</span>
            <input id="customerEmail" type="email" value="customer@emart.com" required />
          </label>
          <label class="form-field">
            <span>Password</span>
            <input id="customerPassword" type="password" value="customer123" required />
          </label>
          <p class="form-message" id="customerLoginMessage" aria-live="polite"></p>
          <button class="primary-button form-button" type="submit">Continue</button>
        </form>

        <form class="auth-form role-panel" id="vendorLoginForm" data-auth-panel="vendor" hidden>
          <span class="eyebrow">Vendor</span>
          <h2>Manage your products</h2>
          <label class="form-field">
            <span>Email</span>
            <input id="vendorEmail" type="email" value="vendor@emart.com" required />
          </label>
          <label class="form-field">
            <span>Password</span>
            <input id="vendorPassword" type="password" value="vendor123" required />
          </label>
          <p class="form-message" id="vendorLoginMessage" aria-live="polite"></p>
          <button class="primary-button form-button" type="submit">Continue</button>
        </form>

        <form class="auth-form role-panel" id="adminLoginForm" data-auth-panel="admin" hidden>
          <span class="eyebrow">Admin</span>
          <h2>Control website data</h2>
          <label class="form-field">
            <span>Admin password</span>
            <input id="adminPassword" type="password" value="admin123" required />
          </label>
          <p class="form-message" id="adminLoginMessage" aria-live="polite"></p>
          <button class="primary-button form-button" type="submit">Continue</button>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
