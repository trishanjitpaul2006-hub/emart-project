<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMART Add Product | Vendor Form</title>
  <meta name="description" content="Add product UI for vendors in the EMART premium dashboard experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="add-product">
  <div class="page-shell page-shell-medium">
    <header class="navbar glass-panel">
      <button id="menuToggle" class="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="sideMenu" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a class="brand" href="index.html" aria-label="EMART Home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
            <defs>
              <linearGradient id="brandGradientAddProduct" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff7a00" />
                <stop offset="45%" stop-color="#ff9f43" />
                <stop offset="100%" stop-color="#ffb86b" />
              </linearGradient>
            </defs>
            <path d="M16 14h30a5 5 0 0 1 0 10H26v8h18a5 5 0 0 1 0 10H26v8h20a5 5 0 0 1 0 10H16z" fill="url(#brandGradientAddProduct)"/>
            <path d="M41 18h7l4 18H28" fill="none" stroke="#e6f8ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
            <circle cx="34" cy="50" r="3" fill="#e6f8ff"/>
            <circle cx="47" cy="50" r="3" fill="#e6f8ff"/>
          </svg>
        </span>
        <span>
          <strong>EMART</strong>
          <small>Premium everyday shopping</small>
        </span>
      </a>

      <a class="header-cart" href="cart.html" aria-label="View cart">
        <svg viewBox="0 0 24 24"><path d="M3 5h2l2.4 9.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.8L21 8H7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="19" r="1.5"/><circle cx="18" cy="19" r="1.5"/></svg>
        <span class="cart-count" data-cart-count hidden>0</span>
      </a>

      <div class="nav-panel" id="navPanel">
        <nav class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="products.html" class="nav-link">Products</a>
          <a href="cart.html" class="nav-link">Cart</a>
          <a href="testimonials.html" class="nav-link">Testimonials</a>
          <a href="vendor-dashboard.html" class="nav-link" data-role-only="vendor" hidden>Vendor Dashboard</a>
          <a href="admin-dashboard.html" class="nav-link" data-role-only="admin" hidden>Admin Dashboard</a>
          <a href="add-product.html" class="nav-link active" data-role-only="vendor admin" hidden>Add Product</a>
        </nav>

        <form class="nav-search" action="products.html">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M10.5 4a6.5 6.5 0 1 1 0 13a6.5 6.5 0 0 1 0-13M15.2 15.2 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <input type="search" name="q" placeholder="Search products, categories..." aria-label="Search products" />
          <button class="search-submit" type="submit">Search</button>
        </form>

        <div class="nav-actions">
          <a class="auth-button login-button" href="login.html" data-guest-only>Login / Admin</a>
          <button class="auth-button signup-button" type="button" data-role-only="customer vendor admin" data-logout hidden>Logout</button>
        </div>
      </div>
    </header>

    <main>
      <section class="section-block reveal">
        <div class="section-heading compact-center">
          <span class="eyebrow">Vendor form</span>
          <h1>Add a new product</h1>
          <p>Saved products appear immediately on the home page, products page, details page, and dashboard.</p>
        </div>
        <form class="form-card glass-panel product-form" id="addProductForm">
          <div class="form-grid two-col">
            <label class="form-field">
              <span>Product name</span>
              <input type="text" name="name" placeholder="Enter product name" required />
            </label>
            <label class="form-field">
              <span>Category</span>
              <select name="category" required>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="home">Home</option>
                <option value="beauty">Beauty</option>
                <option value="grocery">Grocery</option>
              </select>
            </label>
            <label class="form-field">
              <span>Price in ₹</span>
              <input type="number" name="price" min="1" placeholder="2499" required />
            </label>
            <label class="form-field">
              <span>Old price in ₹</span>
              <input type="number" name="oldPrice" min="0" placeholder="3299" />
            </label>
            <label class="form-field">
              <span>Discount percentage</span>
              <input type="number" name="discount" min="0" max="100" placeholder="20" />
            </label>
            <label class="form-field">
              <span>Stock quantity</span>
              <input type="number" name="stock" min="0" placeholder="48" required />
            </label>
            <label class="form-field full-field">
              <span>Product image URL</span>
              <input type="url" name="image" placeholder="Paste product image URL" required />
            </label>
          </div>
          <label class="form-field">
            <span>Description</span>
            <textarea rows="5" name="description" placeholder="Write a concise product description" required></textarea>
          </label>
          <p class="form-message" id="productFormMessage" aria-live="polite"></p>
          <button class="primary-button form-button" type="submit">Save Product</button>
        </form>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
